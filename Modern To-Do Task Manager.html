<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Modern To-Do Task Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{background:linear-gradient(135deg,#6a11cb,#2575fc);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.app{width:100%;max-width:500px;background:rgba(255,255,255,.15);backdrop-filter:blur(12px);padding:25px;border-radius:18px;color:#fff;box-shadow:0 10px 30px rgba(0,0,0,.3)}
h1{text-align:center;margin-bottom:20px}
.row{display:flex;gap:10px}
input{flex:1;padding:12px;border:none;border-radius:10px;outline:none}
button{padding:12px 16px;border:none;border-radius:10px;background:#fff;color:#2575fc;font-weight:bold;cursor:pointer}
button:hover{transform:scale(1.03)}
ul{list-style:none;margin-top:20px}
li{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.18);padding:12px;border-radius:10px;margin:10px 0}
.task{display:flex;align-items:center;gap:10px;cursor:pointer;flex:1}
.done{text-decoration:line-through;opacity:.6}
.actions button{margin-left:6px;padding:6px 10px}
.stats{text-align:center;margin-top:15px}
</style>
</head>
<body>
<div class="app">
<h1>📝 To-Do Manager</h1>
<div class="row">
<input id="taskInput" placeholder="Enter a task">
<button onclick="addTask()">Add</button>
</div>
<ul id="taskList"></ul>
<div class="stats"><span id="count">0</span> task(s)</div>
</div>

<script>
let tasks=JSON.parse(localStorage.getItem("tasks")||"[]");

function save(){
 localStorage.setItem("tasks",JSON.stringify(tasks));
 render();
}
function addTask(){
 const inp=document.getElementById("taskInput");
 const text=inp.value.trim();
 if(!text)return;
 tasks.push({text,done:false});
 inp.value="";
 save();
}
function toggle(i){
 tasks[i].done=!tasks[i].done;
 save();
}
function editTask(i){
 const t=prompt("Edit task",tasks[i].text);
 if(t!==null && t.trim()){
   tasks[i].text=t.trim();
   save();
 }
}
function del(i){
 tasks.splice(i,1);
 save();
}
function render(){
 const ul=document.getElementById("taskList");
 ul.innerHTML="";
 tasks.forEach((t,i)=>{
  const li=document.createElement("li");
  li.innerHTML=`<div class="task ${t.done?'done':''}" onclick="toggle(${i})">
  <input type="checkbox" ${t.done?'checked':''} onclick="event.stopPropagation();toggle(${i})">
  <span>${t.text}</span></div>
  <div class="actions">
  <button onclick="editTask(${i})">✏️</button>
  <button onclick="del(${i})">🗑️</button>
  </div>`;
  ul.appendChild(li);
 });
 document.getElementById("count").textContent=tasks.length;
}
render();
document.getElementById("taskInput").addEventListener("keypress",e=>{if(e.key==="Enter")addTask();});
</script>
</body>
</html>
